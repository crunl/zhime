<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知我 — 量表评测</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <!-- Navigation -->
    <nav class="nav">
      <div class="nav-links">
        <a class="nav-link" href="index.html">首页</a>
        <a class="nav-link" href="chat.html">对话</a>
        <a class="nav-link active" href="scales.html">量表自评</a>
        <a class="nav-link" href="history.html">情绪历史</a>
        <a class="nav-link" href="about.html">关于</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main">
      <div class="assessment fade-in">
        <!-- Header -->
        <div class="assessment-header">
          <div class="assessment-title"><strong id="scaleName">PHQ-9 抑郁自评量表</strong></div>
          <div class="assessment-subtitle">过去两周，你被以下问题困扰的频率是？</div>
        </div>

        <!-- Form -->
        <div class="assessment-form">
          <!-- Question Counter -->
          <div class="question-counter">
            <div class="question-number">
              <span id="currentNum">1</span>
        
              <span id="totalNum">/9</span>
            </div>
            <div class="question-text" id="questionText">做事时提不起劲或没有兴趣？</div>
          </div>

          <!-- Options -->
          <div class="options" id="optionsList">
            <div class="option" data-value="0" onclick="selectOption(this, 0)">
              <div class="option-radio">
                <div class="option-radio-inner"></div>
              </div>
              <span class="option-label">没有</span>
            </div>
            <div class="option" data-value="1" onclick="selectOption(this, 1)">
              <div class="option-radio">
                <div class="option-radio-inner"></div>
              </div>
              <span class="option-label">有几天</span>
            </div>
            <div class="option" data-value="2" onclick="selectOption(this, 2)">
              <div class="option-radio">
                <div class="option-radio-inner"></div>
              </div>
              <span class="option-label">一半以上天数</span>
            </div>
            <div class="option" data-value="3" onclick="selectOption(this, 3)">
              <div class="option-radio">
                <div class="option-radio-inner"></div>
              </div>
              <span class="option-label">几乎每天</span>
            </div>
          </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar-wrap">
          <svg width="600" height="3" viewBox="0 0 600 3" fill="none">
            <rect id="progressFill" x="0" y="0" width="0" height="3" fill="#000"/>
          </svg>
        </div>

        <!-- Navigation Buttons -->
        <div class="nav-btns-wrap">
          <button class="nav-btn nav-btn-prev" id="prevBtn" disabled onclick="prevQuestion()">
            <svg width="65" height="65" viewBox="0 0 65 65" fill="none"><circle cx="32.5" cy="32.5" r="31.5" stroke="#000"/><path d="M37 21l-13 12 13 12" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="nav-btn nav-btn-next" id="nextBtn" disabled onclick="nextQuestion()">
            <svg width="65" height="65" viewBox="0 0 65 65" fill="none"><circle cx="32.5" cy="32.5" r="31.5" stroke="#000"/><path d="M28 21l13 12-13 12" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
